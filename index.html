<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>英語再会ラジオ Ver3.3</title>
<style>
:root{--bg:#0e1118;--card:#171d27;--card2:#242c38;--text:#f5f7fb;--sub:#aab4c2;--accent:#7bdcff;--accent2:#ffd166;--danger:#ff6b6b;--ok:#7cffb2;--hot:#ff9f43;--line:rgba(255,255,255,.08)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0a0d13,#151b25);color:var(--text);min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:16px 14px 34px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
h1{font-size:23px;margin:0}.badge{font-size:12px;font-weight:800;color:#071018;background:var(--accent);border-radius:999px;padding:6px 10px;white-space:nowrap}
.panel{background:rgba(23,29,39,.96);border:1px solid var(--line);border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 10px 28px rgba(0,0,0,.25)}
label{display:block;color:var(--sub);font-size:13px;margin:9px 0 6px}
select,input,textarea{width:100%;border:none;border-radius:14px;background:var(--card2);color:var(--text);padding:12px;font-size:16px;outline:none}
textarea{min-height:170px;resize:vertical;line-height:1.45}
.now{min-height:245px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:16px;padding:26px 14px}
.phase{color:var(--accent2);font-size:14px;font-weight:900}.english{font-size:29px;line-height:1.25;font-weight:900}.japanese{font-size:22px;line-height:1.35;color:#edf2fb}
.count,.mini,.hint{color:var(--sub);font-size:13px;line-height:1.55}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
button{border:none;border-radius:15px;padding:13px 8px;font-size:15px;font-weight:900;color:#071018;background:var(--accent);cursor:pointer;min-height:50px}
button.secondary{background:#d8dfeb}
button.danger{background:var(--danger);color:#fff}
button.ok{background:var(--ok)}
button.hot{background:var(--hot);color:#111}
button.dark{background:#313a49;color:var(--text);border:1px solid var(--line)}
button.nav{border-radius:999px;background:#d8dfeb;color:#071018}
button.play{border-radius:18px;background:var(--ok);font-size:17px;box-shadow:0 0 0 3px rgba(124,255,178,.12)}
button.stop{border-radius:12px;background:var(--danger);color:#fff}
button.skip{border-radius:999px;background:#d8dfeb;color:#071018}
button.star{border-radius:18px;background:#ffe066;color:#111}
button.focus{border-radius:18px;background:var(--hot);color:#111}
button.save{border-radius:14px;background:var(--accent);color:#071018}
button.edit{border-radius:12px;background:#d8dfeb;color:#071018}
button.delete{border-radius:12px;background:var(--danger);color:#fff}
button.utility{border-radius:999px;background:#313a49;color:var(--text);border:1px solid var(--line)}
hr{border:none;border-top:1px solid var(--line);margin:14px 0}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.tab{background:#313a49;color:var(--text)}.tab.active{background:var(--accent);color:#071018}
.hidden{display:none}.list{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:14px;padding:8px;background:#111722}.item{padding:8px;border-bottom:1px solid var(--line);font-size:13px;color:var(--sub)}.item:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app">
<header><h1>📻 英語再会ラジオ</h1><div class="badge">Ver3.3 Pack自動追加</div></header>

<section class="panel">
<label>Pack</label>
<select id="packSelect"></select>
<div class="mini" id="packInfo"></div>
</section>

<section class="panel now">
<div class="phase" id="phase">再生待ち</div>
<div class="english" id="englishText">▶️ を押して開始</div>
<div class="japanese" id="japaneseText">英語 → 英語 → 日本語</div>
<div class="count" id="counter">0 / 0</div>
</section>

<section class="panel">
<div class="controls"><button class="nav" id="prevBtn">⬅️ 戻る</button><button class="play" id="playBtn">▶️ 再生</button><button class="nav" id="nextBtn">次へ ➡️</button></div>
<div class="controls"><button class="stop" id="stopBtn">■ 停止</button><button class="utility" id="shuffleBtn">🔀 混ぜる</button><button class="utility" id="loopBtn">🔁 ループ ON</button></div>
<div class="grid2" style="margin-top:10px"><button class="star" id="favBtn">⭐ 保存</button><button class="focus" id="focusBtn">🔥 強化</button></div>
</section>

<section class="panel">
<div class="grid2">
<div><label>再生モード</label><select id="modeSelect"><option value="en-en-ja" selected>英語 → 英語 → 日本語</option><option value="en-only">英語 → 英語</option><option value="ja-en-en">日本語 → 英語 → 英語</option></select></div>
<div><label>間隔</label><select id="pauseSelect"><option value="900">短め</option><option value="1500" selected>普通</option><option value="2300">長め</option><option value="3300">かなり長め</option></select></div>
</div>
<div class="grid2">
<div><label>速度</label><select id="rateSelect"><option value="0.78">ゆっくり</option><option value="0.9" selected>普通</option><option value="1.02">少し速い</option></select></div>
<div><label>表示</label><select id="screenSelect"><option value="both" selected>英語＋日本語</option><option value="english">英語だけ</option></select></div>
</div>
</section>

<section class="panel">
<div class="tabs"><button class="tab active" id="addTab">Pack追加</button><button class="tab" id="manageTab">Pack管理</button></div>
<div id="addArea">
<label>Pack名</label><input id="newPackName" placeholder="例：新しい構文（6月25日更新版）">
<label>内容：英語と日本語を交互に貼る</label>
<textarea id="newPackText" placeholder="I'm hungry.
お腹が空いた。

I need coffee.
コーヒーが欲しい。"></textarea>
<div class="controls"><button class="save" id="savePackBtn">＋ Pack保存</button></div>
<p class="hint">保存したPackはこのブラウザ内に残ります。iPhoneで追加したPackをiPadにも入れたい時は、内容をコピペして同じように追加してください。</p>
</div>

<div id="manageArea" class="hidden">
<label>選択中Packの中身</label><div class="list" id="itemList"></div>
<div class="controls"><button class="edit" id="renameBtn">✏️ 名前変更</button><button class="edit" id="duplicateBtn">📄 複製</button><button class="delete" id="deleteBtn">🗑️ 削除</button></div>
<hr>
<label>選択中Packを編集</label><textarea id="editPackText"></textarea>
<div class="controls"><button class="save" id="updatePackBtn">💾 編集保存</button><button class="utility" id="exportBtn">📤 書き出し</button><button class="utility" id="importBtn">📥 読込欄へ</button></div>
</div>
</section>
</div>

<script>
const DEFAULT_PACKS = {
 "⭐ My Favorites":[],
 "🔥 Strengthening Now":[],
 "構文30ラジオ":[
  ["I’m going to study English tonight.","今夜英語を勉強する予定です。"],["I’ll stick with this plan.","この計画を続けます。"],["I want to visit Australia someday.","いつかオーストラリアに行きたいです。"],["I’d like a coffee.","コーヒーをください。"],["I’m trying to speak English every day.","毎日英語を話そうとしています。"],["I’m thinking about taking a trip next month.","来月旅行に行こうと考えています。"],["I should stop drinking alcohol.","お酒をやめた方がいいです。"],["I'm supposed to call my wife tonight.","今夜妻に電話する予定です。"],["Can I sit here?","ここに座ってもいいですか？"],["Can you open the window?","窓を開けてもらえますか？"],["I'm looking for the restroom.","トイレを探しています。"],["Do you have free Wi-Fi?","無料Wi-Fiはありますか？"],["Is there a restroom nearby?","近くにトイレはありますか？"],["I think this café is really nice.","このカフェは本当に良いと思います。"],["I don't think it's a good idea.","それは良い考えだとは思いません。"],["I like learning English.","英語を学ぶのが好きです。"],["I don't like crowded trains.","満員電車は好きではありません。"],["I've been to Osaka many times.","大阪には何度も行ったことがあります。"],["I've never been to Australia.","オーストラリアに行ったことがありません。"],["I've already finished my work.","もう仕事を終えました。"],["I'm interested in learning English.","英語学習に興味があります。"],["I'm tired of waiting.","待つのにうんざりしています。"],["What do you think about this café?","このカフェについてどう思いますか？"],["How do you study English?","どうやって英語を勉強していますか？"],["How about having coffee after work?","仕事の後にコーヒーでもどうですか？"],["What happened at work today?","今日仕事で何がありましたか？"],["It depends on the weather.","天気次第です。"],["By the way, how was your trip?","ところで旅行はどうでしたか？"],["I didn't sleep well. That's why I'm tired.","よく眠れませんでした。だから疲れています。"],["For example, Starbucks.","例えばスターバックスです。"]
 ],
 "仕事行く前ラジオ":[
  ["I'm awake.","起きた。"],["I'm brushing my teeth.","歯を磨いています。"],["I'm heating up my oatmeal.","オートミールを温めています。"],["I'm heating up my broccoli.","ブロッコリーを温めています。"],["I'm having breakfast.","朝ごはんを食べています。"],["I need coffee.","コーヒーが欲しい。"],["I'm taking a shower.","シャワーを浴びています。"],["I'm drying off.","体を拭いています。"],["I'm drying my hair.","髪を乾かしています。"],["I'm putting on lotion.","化粧水を塗っています。"],["I'm fixing my hair.","髪を整えています。"],["I need to use the bathroom.","トイレに行きたいです。"],["I'm making lunch.","お昼ごはんを作っています。"],["I'm getting ready for work.","仕事の準備をしています。"],["I hope today goes well.","今日がうまくいきますように。"],["I'm leaving for work.","仕事へ出発します。"],["I'm walking to the station.","駅まで歩いています。"],["I hope the train isn't too crowded.","電車が混みすぎていませんように。"],["My legs are tired.","足が疲れています。"]
 ],
 "超重要チャンク":[
  ["I don't know.","分からない。"],["I'm not sure.","よく分からない。"],["No idea.","全然分からない。"],["Sounds good.","いいね。"],["Me too.","私も。"],["Are you okay?","大丈夫？"],["What happened?","どうしたの？"],["Come on.","さあ行こう。"],["Let's go.","行こう。"],["I have to go.","もう行かなきゃ。"]
 ],
 "2026-06 学習ログ①":[
  ["I spent the whole day studying English.","一日中英語を勉強していました。"],["I got sleepy and took a nap.","眠くなったので昼寝しました。"],["I traveled from Hakata to Kobe.","博多から神戸へ移動しました。"],["I got on the train at Tokyo Station.","東京駅で電車に乗りました。"],["We arrived at the station.","駅に到着しました。"],["I packed up my laptop.","ノートパソコンを片付けました。"],["I made a decision to quit drinking.","禁酒することを決意しました。"],["I'm having coffee.","コーヒーを飲んでいます。"],["I keep running.","走り続けています。"],["I'm going to stick with this plan.","この計画を続けるつもりです。"],["Let's try it and see how it goes.","とりあえずやってみよう。"],["I have a clear idea of my goals.","目標がはっきりしています。"],["For now, this is enough.","今のところこれで十分です。"],["I'll stick with this plan for a month and see how it goes.","この計画を1か月続けて様子を見ます。"],["I'm proud of myself.","自分を誇りに思います。"],["I found everything I needed.","必要なものは全部見つかりました。"],["I spend a lot of time studying English.","英語学習にたくさん時間を使っています。"],["I'm working on my health.","健康改善に取り組んでいます。"]
 ],
 "日記からの新単語① 6月22日":[
  ["disappointment","失望・がっかりするもの"],
  ["offer","提供する"],
  ["reply","返信する"],
  ["bring","持ってくる"],
  ["everywhere","どこでも"],
  ["something","何か"],
  ["someone","誰か"],
  ["somewhere","どこか"],
  ["relieved","安心した"],
  ["notice","気付く"],
  ["useful","便利な"],
  ["pick up","手に取る"],
  ["feel hungry","お腹が空く"],
  ["right away","すぐに"]
 ]
};
const STORAGE_KEY="english_reunion_radio_packs_v3";
const POS_KEY="english_reunion_radio_positions_v3";
let packs=loadPacks(), positions=loadPositions(), currentPackName=Object.keys(packs)[0], items=packs[currentPackName], index=positions[currentPackName]||0, isPlaying=false, loop=true, timers=[], voices=[];
const $=id=>document.getElementById(id);
function normalize(p){let out={}; Object.keys(p).forEach(k=>out[k]=p[k].map(x=>Array.isArray(x)?{english:x[0],japanese:x[1]}:x)); return out}
function loadPacks(){
 try{
  const s=localStorage.getItem(STORAGE_KEY);
  const standard=normalize(DEFAULT_PACKS);
  if(s){
   const saved=JSON.parse(s);
   let changed=false;
   Object.keys(standard).forEach(name=>{
    if(!saved[name]){
     saved[name]=standard[name];
     changed=true;
    }
   });
   if(changed) localStorage.setItem(STORAGE_KEY,JSON.stringify(saved));
   return saved;
  }
 }catch(e){}
 const p=normalize(DEFAULT_PACKS);
 localStorage.setItem(STORAGE_KEY,JSON.stringify(p));
 return p;
}
function loadPositions(){try{return JSON.parse(localStorage.getItem(POS_KEY)||"{}")}catch(e){return {}}}
function saveAll(){localStorage.setItem(STORAGE_KEY,JSON.stringify(packs))}
function savePosition(){positions[currentPackName]=index; localStorage.setItem(POS_KEY,JSON.stringify(positions))}
function populatePacks(selected=currentPackName){const sel=$("packSelect"); sel.innerHTML=""; Object.keys(packs).forEach(name=>{const opt=document.createElement("option"); opt.value=name; opt.textContent=name; sel.appendChild(opt)}); if(packs[selected])sel.value=selected; currentPackName=sel.value; items=packs[currentPackName]||[]; index=Math.min(positions[currentPackName]||0, Math.max(items.length-1,0)); updateAll()}
function updateAll(){$("packInfo").textContent=`${items.length}フレーズ / 保存位置 ${items.length?index+1:0}`; if(items.length) setDisplay("再生待ち",items[index].english,items[index].japanese); else setDisplay("空のPack","",""); renderList(); fillEdit()}
function setDisplay(phase,en,ja){$("phase").textContent=phase; $("englishText").textContent=en||""; $("japaneseText").textContent=$("screenSelect").value==="english"?"":(ja||""); $("counter").textContent=items.length?`${index+1} / ${items.length}`:"0 / 0"; savePosition()}
function wait(ms){return new Promise(r=>{const t=setTimeout(r,ms); timers.push(t)})}
function stopAll(){isPlaying=false; speechSynthesis.cancel(); timers.forEach(clearTimeout); timers=[]; $("playBtn").textContent="▶️ 再生"; if(items[index])setDisplay("停止中",items[index].english,items[index].japanese)}
function pickVoice(lang){voices=speechSynthesis.getVoices(); const cs=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(lang)); return cs.find(v=>/premium|enhanced|siri|natural|kyoko|samantha|allison|ava/i.test(v.name))||cs[0]||null}
function speak(text,lang){return new Promise(resolve=>{speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang=lang==="ja"?"ja-JP":"en-US"; u.rate=parseFloat($("rateSelect").value); u.pitch=1; u.volume=lang==="ja"?1:0.75; const v=pickVoice(lang==="ja"?"ja":"en"); if(v)u.voice=v; u.onend=resolve; u.onerror=resolve; speechSynthesis.speak(u)})}
async function step(label,text,lang,item){setDisplay(label,item.english,label==="日本語"?item.japanese:""); await speak(text,lang)}
async function playItem(){if(!items.length)return; const pause=parseInt($("pauseSelect").value,10), item=items[index], mode=$("modeSelect").value; const steps=mode==="en-only"?[["English 1",item.english,"en"],["English 2",item.english,"en"]]:mode==="ja-en-en"?[["日本語",item.japanese,"ja"],["English 1",item.english,"en"],["English 2",item.english,"en"]]:[["English 1",item.english,"en"],["English 2",item.english,"en"],["日本語",item.japanese,"ja"]]; for(const s of steps){if(!isPlaying)return; await step(s[0],s[1],s[2],item); if(!isPlaying)return; await wait(pause)}}
async function playLoop(){if(isPlaying)return; isPlaying=true; $("playBtn").textContent="⏸ 一時停止"; while(isPlaying){await playItem(); if(!isPlaying)break; index++; if(index>=items.length){if(loop)index=0; else{stopAll();break}} savePosition()}}
function jumpTo(newIndex,label){if(!items.length)return; const wasPlaying=isPlaying; speechSynthesis.cancel(); timers.forEach(clearTimeout); timers=[]; index=(newIndex+items.length)%items.length; setDisplay(label,items[index].english,items[index].japanese); if(wasPlaying){isPlaying=false; setTimeout(()=>playLoop(),120)}}
function prev(){jumpTo(index-1,"前へ")} function next(){jumpTo(index+1,"次へ")}
function parsePairs(text){const lines=text.split(/\n/).map(s=>s.trim()).filter(Boolean); const arr=[]; for(let i=0;i<lines.length;i+=2){if(lines[i]&&lines[i+1])arr.push({english:lines[i],japanese:lines[i+1]})} return arr}
function pairsToText(arr){return arr.map(x=>`${x.english}\n${x.japanese}`).join("\n\n")}
function renderList(){const box=$("itemList"); if(!box)return; box.innerHTML=""; items.forEach((it,i)=>{const d=document.createElement("div"); d.className="item"; d.textContent=`${i+1}. ${it.english} / ${it.japanese}`; box.appendChild(d)})}
function fillEdit(){$("editPackText").value=pairsToText(items)}
function addToSpecial(packName){if(!items[index])return; if(!packs[packName]) packs[packName]=[]; const it=items[index]; const exists=packs[packName].some(x=>x.english===it.english && x.japanese===it.japanese); if(!exists){packs[packName].push({english:it.english,japanese:it.japanese}); saveAll(); alert(`${packName} に追加したで！`)} else alert("もう追加済みやで")}
$("packSelect").addEventListener("change",e=>{stopAll(); currentPackName=e.target.value; items=packs[currentPackName]; index=Math.min(positions[currentPackName]||0, Math.max(items.length-1,0)); updateAll()});
$("playBtn").addEventListener("click",()=>isPlaying?stopAll():playLoop()); $("stopBtn").addEventListener("click",stopAll); $("prevBtn").addEventListener("click",prev); $("nextBtn").addEventListener("click",next);
$("favBtn").addEventListener("click",()=>addToSpecial("⭐ My Favorites")); $("focusBtn").addEventListener("click",()=>addToSpecial("🔥 Strengthening Now"));
$("shuffleBtn").addEventListener("click",()=>{stopAll(); items=[...items].sort(()=>Math.random()-.5); packs[currentPackName]=items; saveAll(); index=0; updateAll()});
$("loopBtn").addEventListener("click",()=>{loop=!loop; $("loopBtn").textContent=loop?"🔁 ループ ON":"🔁 ループ OFF"}); $("screenSelect").addEventListener("change",()=>items[index]&&setDisplay($("phase").textContent,items[index].english,items[index].japanese));
$("addTab").addEventListener("click",()=>{$("addTab").classList.add("active");$("manageTab").classList.remove("active");$("addArea").classList.remove("hidden");$("manageArea").classList.add("hidden")});
$("manageTab").addEventListener("click",()=>{$("manageTab").classList.add("active");$("addTab").classList.remove("active");$("manageArea").classList.remove("hidden");$("addArea").classList.add("hidden");renderList();fillEdit()});
$("savePackBtn").addEventListener("click",()=>{const name=$("newPackName").value.trim(), arr=parsePairs($("newPackText").value); if(!name)return alert("Pack名を入れてね"); if(!arr.length)return alert("英語と日本語を交互に入れてね"); packs[name]=arr; saveAll(); currentPackName=name; index=0; positions[currentPackName]=0; savePosition(); populatePacks(name); alert("Pack保存したで！")});
$("updatePackBtn").addEventListener("click",()=>{const arr=parsePairs($("editPackText").value); packs[currentPackName]=arr; items=arr; index=Math.min(index,Math.max(items.length-1,0)); saveAll(); savePosition(); updateAll(); alert("編集保存したで！")});
$("renameBtn").addEventListener("click",()=>{const nn=prompt("新しいPack名",currentPackName); if(!nn||!nn.trim())return; packs[nn.trim()]=packs[currentPackName]; delete packs[currentPackName]; positions[nn.trim()]=positions[currentPackName]||0; delete positions[currentPackName]; saveAll(); localStorage.setItem(POS_KEY,JSON.stringify(positions)); currentPackName=nn.trim(); populatePacks(currentPackName)});
$("duplicateBtn").addEventListener("click",()=>{const nn=prompt("複製Pack名",currentPackName+" コピー"); if(!nn||!nn.trim())return; packs[nn.trim()]=JSON.parse(JSON.stringify(packs[currentPackName])); positions[nn.trim()]=0; saveAll(); localStorage.setItem(POS_KEY,JSON.stringify(positions)); currentPackName=nn.trim(); populatePacks(currentPackName)});
$("deleteBtn").addEventListener("click",()=>{if(Object.keys(packs).length<=1)return alert("Packは最低1つ必要やで"); if(!confirm(`${currentPackName} を削除する？`))return; delete packs[currentPackName]; delete positions[currentPackName]; saveAll(); localStorage.setItem(POS_KEY,JSON.stringify(positions)); currentPackName=Object.keys(packs)[0]; index=positions[currentPackName]||0; populatePacks(currentPackName)});
$("exportBtn").addEventListener("click",()=>{navigator.clipboard.writeText(JSON.stringify(packs,null,2)); alert("全Packデータをコピーしたで")});
$("importBtn").addEventListener("click",()=>{$("newPackName").value=currentPackName+" 編集コピー";$("newPackText").value=pairsToText(items);$("addTab").click()});
speechSynthesis.onvoiceschanged=()=>voices=speechSynthesis.getVoices(); populatePacks();
</script>
</body>
</html>
